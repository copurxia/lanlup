name: CI regexparse-rs (wasip1)

on:
  push:
    paths:
      - 'regexparse-rs/**'
      - '.github/workflows/regexparse-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'regexparse-rs/**'
      - '.github/workflows/regexparse-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: regexparse-rs
