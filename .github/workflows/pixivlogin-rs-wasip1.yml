name: CI pixivlogin-rs (wasip1)

on:
  push:
    paths:
      - 'pixivlogin-rs/**'
      - '.github/workflows/pixivlogin-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'pixivlogin-rs/**'
      - '.github/workflows/pixivlogin-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: pixivlogin-rs
