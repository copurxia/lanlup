name: CI ehentai-rs (wasip1)

on:
  push:
    paths:
      - 'ehentai-rs/**'
      - '.github/workflows/ehentai-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'ehentai-rs/**'
      - '.github/workflows/ehentai-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: ehentai-rs
