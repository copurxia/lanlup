name: CI xmeta-rs (wasip1)

on:
  push:
    paths:
      - 'xmeta-rs/**'
      - '.github/workflows/xmeta-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'xmeta-rs/**'
      - '.github/workflows/xmeta-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: xmeta-rs
