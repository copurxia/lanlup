name: Reusable Build Wasip1

on:
  workflow_call:
    inputs:
      plugin:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.plugin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Build wasm32-wasip1 release
        run: cargo build --locked --target wasm32-wasip1 --release

      - name: Locate wasm artifact
        id: locate
        shell: bash
        run: |
          wasm_file="$(find target/wasm32-wasip1/release -maxdepth 1 -type f -name '*.wasm' | head -n 1)"
          if [ -z "${wasm_file}" ]; then
            echo "No wasm artifact found in target/wasm32-wasip1/release"
            exit 1
          fi
          echo "wasm_file=${wasm_file}" >> "${GITHUB_OUTPUT}"

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.plugin }}-wasip1
          path: ${{ inputs.plugin }}/${{ steps.locate.outputs.wasm_file }}
          if-no-files-found: error

      - name: Prepare release asset
        if: github.event_name != 'pull_request'
        id: release_asset
        shell: bash
        run: |
          asset="${{ runner.temp }}/${{ inputs.plugin }}-wasip1.wasm"
          cp "${{ steps.locate.outputs.wasm_file }}" "${asset}"
          echo "file=${asset}" >> "${GITHUB_OUTPUT}"

      - name: Publish to shared nightly release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: nightly
          target_commitish: ${{ github.sha }}
          make_latest: false
          generate_release_notes: true
          overwrite_files: true
          files: |
            ${{ steps.release_asset.outputs.file }}
