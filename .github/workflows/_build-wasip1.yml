name: Reusable Build Wasip1

on:
  workflow_call:
    inputs:
      plugin:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.plugin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Build wasm32-wasip1 release
        run: cargo build --locked --target wasm32-wasip1 --release

      - name: Locate wasm artifact
        id: locate
        shell: bash
        run: |
          wasm_file="$(find target/wasm32-wasip1/release -maxdepth 1 -type f -name '*.wasm' | head -n 1)"
          if [ -z "${wasm_file}" ]; then
            echo "No wasm artifact found in target/wasm32-wasip1/release"
            exit 1
          fi
          echo "wasm_file=${wasm_file}" >> "${GITHUB_OUTPUT}"

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.plugin }}-wasip1
          path: ${{ inputs.plugin }}/${{ steps.locate.outputs.wasm_file }}
          if-no-files-found: error
