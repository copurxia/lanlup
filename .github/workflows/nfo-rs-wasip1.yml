name: CI nfo-rs (wasip1)

on:
  push:
    paths:
      - 'nfo-rs/**'
      - '.github/workflows/nfo-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'nfo-rs/**'
      - '.github/workflows/nfo-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: nfo-rs
