name: CI xlogin-rs (wasip1)

on:
  push:
    paths:
      - 'xlogin-rs/**'
      - '.github/workflows/xlogin-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'xlogin-rs/**'
      - '.github/workflows/xlogin-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: xlogin-rs
