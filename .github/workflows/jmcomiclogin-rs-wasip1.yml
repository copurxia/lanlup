name: CI jmcomiclogin-rs (wasip1)

on:
  push:
    paths:
      - 'jmcomiclogin-rs/**'
      - '.github/workflows/jmcomiclogin-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'jmcomiclogin-rs/**'
      - '.github/workflows/jmcomiclogin-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: jmcomiclogin-rs
