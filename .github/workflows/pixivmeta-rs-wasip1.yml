name: CI pixivmeta-rs (wasip1)

on:
  push:
    paths:
      - 'pixivmeta-rs/**'
      - '.github/workflows/pixivmeta-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'pixivmeta-rs/**'
      - '.github/workflows/pixivmeta-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: pixivmeta-rs
