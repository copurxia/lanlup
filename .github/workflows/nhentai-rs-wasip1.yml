name: CI nhentai-rs (wasip1)

on:
  push:
    paths:
      - 'nhentai-rs/**'
      - '.github/workflows/nhentai-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'nhentai-rs/**'
      - '.github/workflows/nhentai-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: nhentai-rs
