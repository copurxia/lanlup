name: CI jmcomicmeta-rs (wasip1)

on:
  push:
    paths:
      - 'jmcomicmeta-rs/**'
      - '.github/workflows/jmcomicmeta-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'jmcomicmeta-rs/**'
      - '.github/workflows/jmcomicmeta-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: jmcomicmeta-rs
