name: CI ehentaisource-rs (wasip1)

on:
  push:
    paths:
      - 'ehentaisource-rs/**'
      - '.github/workflows/ehentaisource-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'ehentaisource-rs/**'
      - '.github/workflows/ehentaisource-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: ehentaisource-rs
