name: CI pixivdl-rs (wasip1)

on:
  push:
    paths:
      - 'pixivdl-rs/**'
      - '.github/workflows/pixivdl-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'pixivdl-rs/**'
      - '.github/workflows/pixivdl-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: pixivdl-rs
