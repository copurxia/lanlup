name: CI opfmeta-rs (wasip1)

on:
  push:
    paths:
      - 'opfmeta-rs/**'
      - '.github/workflows/opfmeta-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'opfmeta-rs/**'
      - '.github/workflows/opfmeta-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: opfmeta-rs
