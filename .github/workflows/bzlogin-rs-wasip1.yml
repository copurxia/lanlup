name: CI bzlogin-rs (wasip1)

on:
  push:
    paths:
      - 'bzlogin-rs/**'
      - '.github/workflows/bzlogin-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'bzlogin-rs/**'
      - '.github/workflows/bzlogin-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: bzlogin-rs
