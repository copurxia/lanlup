name: CI picacgdl-rs (wasip1)

on:
  push:
    paths:
      - 'picacgdl-rs/**'
      - '.github/workflows/picacgdl-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'picacgdl-rs/**'
      - '.github/workflows/picacgdl-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: picacgdl-rs
