name: CI bzsource-rs (wasip1)

on:
  push:
    paths:
      - 'bzsource-rs/**'
      - '.github/workflows/bzsource-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'bzsource-rs/**'
      - '.github/workflows/bzsource-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: bzsource-rs
