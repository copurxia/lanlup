name: CI jmcomicsource-rs (wasip1)

on:
  push:
    paths:
      - 'jmcomicsource-rs/**'
      - '.github/workflows/jmcomicsource-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'jmcomicsource-rs/**'
      - '.github/workflows/jmcomicsource-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: jmcomicsource-rs
