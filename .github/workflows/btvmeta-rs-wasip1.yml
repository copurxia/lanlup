name: CI btvmeta-rs (wasip1)

on:
  push:
    paths:
      - 'btvmeta-rs/**'
      - '.github/workflows/btvmeta-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'btvmeta-rs/**'
      - '.github/workflows/btvmeta-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: btvmeta-rs
