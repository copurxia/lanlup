name: CI picacgmeta-rs (wasip1)

on:
  push:
    paths:
      - 'picacgmeta-rs/**'
      - '.github/workflows/picacgmeta-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'picacgmeta-rs/**'
      - '.github/workflows/picacgmeta-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: picacgmeta-rs
