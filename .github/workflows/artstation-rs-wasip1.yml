name: CI artstation-rs (wasip1)

on:
  push:
    paths:
      - 'artstation-rs/**'
      - '.github/workflows/artstation-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  pull_request:
    paths:
      - 'artstation-rs/**'
      - '.github/workflows/artstation-rs-wasip1.yml'
      - '.github/workflows/_build-wasip1.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_build-wasip1.yml
    with:
      plugin: artstation-rs
